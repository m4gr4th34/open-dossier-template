name: build-pdf
on:
  push:
    paths:
      - 'paper/manuscript.tex'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Compile manuscript.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: manuscript.tex
          working_directory: paper
      - name: Commit regenerated PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add paper/manuscript.pdf
          if git diff --cached --quiet; then
            echo "manuscript.pdf unchanged; nothing to commit."
          else
            git commit -m "Auto-build manuscript.pdf from source [skip ci]"
            git push
          fi
