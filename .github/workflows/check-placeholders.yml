name: check-placeholders
on:
  push:
  pull_request:
jobs:
  placeholders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Placeholder-honesty check (gated on release state)
        run: python3 verification/check_placeholders.py
